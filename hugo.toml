baseURL = "https://fit.lemric.com/"
title = "LemricFit"
languageCode = "en"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false
enableRobotsTXT = true
disableKinds = ["taxonomy", "term", "RSS"]

[params]
  appName = "LemricFit"
  contactEmail = "biuro@lemric.com"

[languages]
  [languages.en]
    languageName = "English"
    weight = 1
    title = "LemricFit"
    [languages.en.params]
      tagline = "Personal training, recorded on your phone."
      heroLead = "LemricFit is for running, cycling, walking, and hiking. It keeps GPS tracks and workout summaries on your device — no LemricFit account, no mandatory cloud sync."
      navSupport = "Help"
      navPrivacy = "Privacy"
      ctaContact = "biuro@lemric.com"
      ctaSupport = "Help"
      ctaPrivacy = "Privacy"
      footerNote = "LemricFit · Dominik Labudziński"
      feature1Title = "GPS"
      feature1Body = "Records your route with filtering for noisy signal, plus elevation, splits, and maps."
      feature2Title = "Sensors"
      feature2Body = "Connect Bluetooth heart rate, cadence, or power. Link Apple Health or Health Connect if you want."
      feature3Title = "On your device"
      feature3Body = "Workouts live in an encrypted local database. Cloud backup is optional and never includes your encryption key."
      bandTitle = "Questions?"
      bandBody = "Write to biuro@lemric.com. We reply to every message."
      shareCardAlt = "Example LemricFit ride summary with map and metrics"
  [languages.pl]
    languageName = "Polski"
    weight = 2
    title = "LemricFit"
    [languages.pl.params]
      tagline = "Trening osobisty, zapisany na Twoim telefonie."
      heroLead = "LemricFit służy do biegania, jazdy rowerem, spacerów i trekkingu. Trasy GPS i podsumowania treningów zostają na urządzeniu — bez konta LemricFit i bez obowiązkowej synchronizacji z chmurą."
      navSupport = "Pomoc"
      navPrivacy = "Prywatność"
      ctaContact = "biuro@lemric.com"
      ctaSupport = "Pomoc"
      ctaPrivacy = "Prywatność"
      footerNote = "LemricFit · Dominik Labudziński"
      feature1Title = "GPS"
      feature1Body = "Zapisuje trasę z filtrowaniem szumu sygnału, a także przewyższenie, odcinki i mapę."
      feature2Title = "Sensory"
      feature2Body = "Podłączysz tętno, kadencję lub moc przez Bluetooth. Opcjonalnie Apple Health albo Health Connect."
      feature3Title = "Na urządzeniu"
      feature3Body = "Treningi są w zaszyfrowanej lokalnej bazie. Kopia w chmurze jest dobrowolna i nigdy nie zawiera klucza szyfrującego."
      bandTitle = "Masz pytanie?"
      bandBody = "Napisz na biuro@lemric.com. Odpowiadamy na każdą wiadomość."
      shareCardAlt = "Przykładowe podsumowanie jazdy w LemricFit z mapą i metrykami"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
