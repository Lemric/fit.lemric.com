baseURL = "https://fit.lemric.com/"
title = "LemricFit"
languageCode = "en"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false
enableRobotsTXT = true
disableKinds = ["taxonomy", "term", "RSS"]

[params]
  appName = "LemricFit"
  contactEmail = "biuro@lemric.com"

[languages]
  [languages.en]
    languageName = "English"
    weight = 1
    title = "LemricFit"
    [languages.en.params]
      tagline = "GPS training on your device."
      heroLead = "Running, cycling, walking, and hiking — with optional sensors and encrypted local storage. No required cloud account."
      navSupport = "Support"
      navPrivacy = "Privacy"
      ctaContact = "Email biuro@lemric.com"
      ctaSupport = "Support"
      ctaPrivacy = "Privacy"
      footerNote = "LemricFit by Lemric"
      feature1Title = "GPS"
      feature1Body = "Filtered tracks, elevation, splits, and maps for outdoor sessions."
      feature2Title = "Sensors"
      feature2Body = "Bluetooth heart rate, cadence, and power. Apple Health and Health Connect when you allow it."
      feature3Title = "Privacy"
      feature3Body = "Encrypted on-device database. Optional backups never include your encryption key."
      bandTitle = "Support"
      bandBody = "Pairing, permissions, backups — write to us."
  [languages.pl]
    languageName = "Polski"
    weight = 2
    title = "LemricFit"
    [languages.pl.params]
      tagline = "Trening GPS na Twoim urządzeniu."
      heroLead = "Bieganie, kolarstwo, spacer i trekking — z opcjonalnymi sensorami i zaszyfrowaną lokalną bazą. Bez obowiązkowego konta w chmurze."
      navSupport = "Wsparcie"
      navPrivacy = "Prywatność"
      ctaContact = "Napisz: biuro@lemric.com"
      ctaSupport = "Wsparcie"
      ctaPrivacy = "Prywatność"
      footerNote = "LemricFit by Lemric"
      feature1Title = "GPS"
      feature1Body = "Filtrowane trasy, przewyższenie, odcinki i mapy pod aktywności outdoor."
      feature2Title = "Sensory"
      feature2Body = "Bluetooth: tętno, kadencja i moc. Apple Health i Health Connect, gdy je włączysz."
      feature3Title = "Prywatność"
      feature3Body = "Zaszyfrowana baza na urządzeniu. Opcjonalne kopie bez klucza szyfrującego."
      bandTitle = "Wsparcie"
      bandBody = "Parowanie, uprawnienia, kopie — napisz do nas."

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
