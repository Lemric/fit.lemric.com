<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang }}" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>
      {{- if .IsHome -}}{{ .Site.Title }} — {{ .Site.Params.tagline }}{{- else -}}{{ .Title }} · {{ .Site.Title }}{{- end -}}
    </title>
    <meta
      name="description"
      content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.heroLead }}{{ end }}"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@450;550;650;750;800&family=Sora:wght@600;700&display=swap"
      rel="stylesheet"
    />
    {{ $css := resources.Get "css/main.css" | minify | fingerprint }}
    <link rel="stylesheet" href="{{ $css.RelPermalink }}" />
    <link rel="canonical" href="{{ .Permalink }}" />
  </head>
  <body>
    {{ partial "header.html" . }}
    <main>
      {{ block "main" . }}{{ end }}
    </main>
    {{ partial "footer.html" . }}
  </body>
</html>
