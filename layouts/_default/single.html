{{ define "main" }}
  <header class="page-hero">
    <div class="wrap wrap--narrow">
      <h1>{{ .Title }}</h1>
      {{ with .Description }}<p>{{ . }}</p>{{ end }}
    </div>
  </header>
  <div class="page-body">
    <div class="wrap wrap--narrow content">
      {{ .Content }}
    </div>
  </div>
{{ end }}
